name: Weekly News Collection

on:
  schedule:
    # Every Monday at 00:00 UTC (09:00 KST)
    - cron: "0 0 * * 1"
  workflow_dispatch: {}

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run news collection
        run: npx tsx scripts/collect-manual.ts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}

      - name: Commit new post
        id: commit
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "content: weekly rebranding news"
          file_pattern: "content/posts/*.json"
          commit_author: "GitHub Action <action@github.com>"

      - name: Notify on new archive
        if: steps.commit.outputs.changes_detected == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LATEST=$(ls -t content/posts/*.json | head -1)
          WEEK=$(basename "$LATEST" .json)
          TITLE=$(jq -r '.title' "$LATEST")
          DESC=$(jq -r '.description' "$LATEST")
          COUNT=$(jq -r '.articleCount' "$LATEST")
          DOMESTIC=$(jq -r '[.articles[] | select(.category=="domestic")] | length' "$LATEST")
          INTL=$(jq -r '[.articles[] | select(.category=="international")] | length' "$LATEST")
          BODY=$(cat <<EOF
          **${TITLE}**

          > ${DESC}

          - 주차: \`${WEEK}\`
          - 총 기사: **${COUNT}개** (국내 ${DOMESTIC}, 해외 ${INTL})
          - 포스트 보기: https://rebranding-brik.vercel.app/posts/${WEEK}
          - 아카이브: https://rebranding-brik.vercel.app/archive

          이 이슈는 GitHub Actions가 자동 생성했습니다. 확인 후 닫아주세요.
          EOF
          )
          gh issue create --title "📰 [$WEEK] $TITLE" --body "$BODY"
