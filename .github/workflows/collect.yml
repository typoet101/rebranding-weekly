name: Weekly News Collection

on:
  schedule:
    # Every Tuesday at 01:00 UTC (10:00 KST) — summarizes last Mon–Sun
    - cron: "0 1 * * 2"
  workflow_dispatch: {}

# Default GITHUB_TOKEN is read-only since 2023; we need write to push the
# generated post and to open the notification issue.
permissions:
  contents: write
  issues: write

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run news collection
        run: npx tsx scripts/collect-manual.ts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}

      - name: Sanity-check generated post
        # Catches the "green CI but broken content" case that happened on
        # 2026-06-22 when a retired model id caused every LLM call to fall
        # back to placeholder text. Workflow exits non-zero so the failure
        # alert step fires and emails the maintainer instead of silently
        # publishing an empty post.
        run: |
          LATEST=$(ls -t content/posts/*.json | head -1)
          TITLE=$(jq -r '.title' "$LATEST")
          DESC=$(jq -r '.description' "$LATEST")
          TOTAL=$(jq '.articleCount' "$LATEST")
          EMPTY=$(jq '[.articles[] | select(.summary == null or .summary == "" or (.summary | contains("요약을 생성하지 못했습니다")))] | length' "$LATEST")

          echo "File:    $LATEST"
          echo "Title:   $TITLE"
          echo "Desc:    $DESC"
          echo "Articles: $TOTAL  (empty summaries: $EMPTY)"

          fail=0
          if [ "$TITLE" = "This Week in Rebranding" ]; then
            echo "::error::Title is the LLM-failure fallback ('This Week in Rebranding') — model call likely 404'd or auth-failed."
            fail=1
          fi
          if [ "$DESC" = "이번 주 주요 리브랜딩 소식을 모았습니다." ]; then
            echo "::error::Description is the LLM-failure fallback."
            fail=1
          fi
          if [ "$EMPTY" -gt 5 ]; then
            echo "::error::Too many empty summaries ($EMPTY/$TOTAL) — summarizer LLM likely failed."
            fail=1
          fi
          if [ "$TOTAL" -lt 10 ]; then
            echo "::error::Suspiciously few articles ($TOTAL) — RSS sources or filter likely broken."
            fail=1
          fi
          exit $fail

      - name: Heal broken image URLs (last 6 weeks)
        # Source sites occasionally replace or delete article images. This
        # scans recent posts, re-fetches og:image for any 404'd URL, and
        # clears irrecoverable ones so the card falls back to summary view.
        run: npx tsx scripts/heal-images.ts
        continue-on-error: true

      - name: Resolve Google News redirect URLs (find missing images)
        # Google News RSS items use opaque redirect URLs that block server-side
        # og:image extraction. This step decodes them to the actual article
        # URL and grabs the og:image from there. Recovers thumbnails for
        # ~half of the international / English articles.
        run: npx tsx scripts/resolve-google-news.ts
        continue-on-error: true

      - name: Mark logo / white-bg thumbnails (imageFit=contain)
        # Sample each thumbnail's perimeter; if ≥5 of 8 sample points are
        # white/transparent it's almost certainly a logo or brand banner,
        # not a photo. Stamping imageFit="contain" makes the card render
        # it with side padding so it doesn't get cropped.
        run: npx tsx scripts/detect-image-bg.ts
        continue-on-error: true

      - name: Commit new post
        id: commit
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "content: weekly rebranding news"
          file_pattern: "content/posts/*.json"
          commit_author: "GitHub Action <action@github.com>"

      - name: Notify on new archive
        if: steps.commit.outputs.changes_detected == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LATEST=$(ls -t content/posts/*.json | head -1)
          WEEK=$(basename "$LATEST" .json)
          TITLE=$(jq -r '.title' "$LATEST")
          DESC=$(jq -r '.description' "$LATEST")
          COUNT=$(jq -r '.articleCount' "$LATEST")
          DOMESTIC=$(jq -r '[.articles[] | select(.category=="domestic")] | length' "$LATEST")
          INTL=$(jq -r '[.articles[] | select(.category=="international")] | length' "$LATEST")
          BODY=$(cat <<EOF
          **${TITLE}**

          > ${DESC}

          - 주차: \`${WEEK}\`
          - 총 기사: **${COUNT}개** (국내 ${DOMESTIC}, 해외 ${INTL})
          - 포스트 보기: https://rebranding-brik.vercel.app/posts/${WEEK}
          - 아카이브: https://rebranding-brik.vercel.app/archive

          이 이슈는 GitHub Actions가 자동 생성했습니다. 확인 후 닫아주세요.
          EOF
          )
          gh issue create --title "📰 [$WEEK] $TITLE" --body "$BODY"

      - name: Alert on failure
        # Fires when any prior step in this job fails. Creates a GitHub Issue
        # so the maintainer is notified by GitHub's default issue email/web
        # notifications. Cron jobs fail silently otherwise.
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          DATE=$(date -u '+%Y-%m-%d %H:%M UTC')
          gh issue create \
            --title "🚨 Weekly collection failed ($DATE)" \
            --body "주간 뉴스 수집 워크플로우가 실패했습니다.

          - 실행 시각: ${DATE}
          - 로그 보기: ${RUN_URL}

          확인 후 fix → 워크플로우를 'Run workflow'로 수동 재실행하세요."
