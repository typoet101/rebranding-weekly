name: Weekly News Collection

on:
  schedule:
    # Every Tuesday at 01:00 UTC (10:00 KST) — summarizes last Mon–Sun
    - cron: "0 1 * * 2"
  workflow_dispatch: {}

# Default GITHUB_TOKEN is read-only since 2023; we need write to push the
# generated post and to open the notification issue.
permissions:
  contents: write
  issues: write

jobs:
  collect:
    runs-on: ubuntu-latest
    # 30분: 요약 배치가 많고(70~110개 기사 × batch 5) SDK maxRetries=5 +
    # 외부 withRetry(3회 backoff)로 인해 최악 상황에서 15분을 넘길 수 있음.
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run news collection
        run: npx tsx scripts/collect-manual.ts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}

      - name: Sanity-check generated post
        # Catches the "green CI but broken content" case that happened on
        # 2026-06-22 when a retired model id caused every LLM call to fall
        # back to placeholder text. Workflow exits non-zero so the failure
        # alert step fires and emails the maintainer instead of silently
        # publishing an empty post.
        run: |
          LATEST=$(ls -t content/posts/*.json | head -1)
          TITLE=$(jq -r '.title' "$LATEST")
          DESC=$(jq -r '.description' "$LATEST")
          TOTAL=$(jq '.articleCount' "$LATEST")
          EMPTY=$(jq '[.articles[] | select(.summary == null or .summary == "" or (.summary | contains("요약을 생성하지 못했습니다")))] | length' "$LATEST")

          echo "File:    $LATEST"
          echo "Title:   $TITLE"
          echo "Desc:    $DESC"
          echo "Articles: $TOTAL  (empty summaries: $EMPTY)"

          fail=0
          if [ "$TITLE" = "This Week in Rebranding" ]; then
            echo "::error::Title is the LLM-failure fallback ('This Week in Rebranding') — model call likely 404'd or auth-failed."
            fail=1
          fi
          if [ "$DESC" = "이번 주 주요 리브랜딩 소식을 모았습니다." ]; then
            echo "::error::Description is the LLM-failure fallback."
            fail=1
          fi
          if [ "$EMPTY" -gt 5 ]; then
            echo "::error::Too many empty summaries ($EMPTY/$TOTAL) — summarizer LLM likely failed."
            fail=1
          fi
          if [ "$TOTAL" -lt 10 ]; then
            echo "::error::Suspiciously few articles ($TOTAL) — RSS sources or filter likely broken."
            fail=1
          fi
          exit $fail

      - name: Heal broken image URLs (last 6 weeks)
        # Source sites occasionally replace or delete article images. This
        # scans recent posts, re-fetches og:image for any 404'd URL, and
        # clears irrecoverable ones so the card falls back to summary view.
        run: npx tsx scripts/heal-images.ts
        continue-on-error: true

      - name: Resolve Google News redirect URLs (find missing images)
        # Google News RSS items use opaque redirect URLs that block server-side
        # og:image extraction. This step decodes them to the actual article
        # URL and grabs the og:image from there. Recovers thumbnails for
        # ~half of the international / English articles.
        run: npx tsx scripts/resolve-google-news.ts
        continue-on-error: true

      - name: Mark logo / white-bg thumbnails (imageFit=contain)
        # Sample each thumbnail's perimeter; if ≥5 of 8 sample points are
        # white/transparent it's almost certainly a logo or brand banner,
        # not a photo. Stamping imageFit="contain" makes the card render
        # it with side padding so it doesn't get cropped.
        run: npx tsx scripts/detect-image-bg.ts
        continue-on-error: true

      - name: Commit new post
        id: commit
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "content: weekly rebranding news"
          file_pattern: "content/posts/*.json"
          commit_author: "GitHub Action <action@github.com>"

      - name: Notify on new archive
        if: steps.commit.outputs.changes_detected == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LATEST=$(ls -t content/posts/*.json | head -1)
          WEEK=$(basename "$LATEST" .json)
          TITLE=$(jq -r '.title' "$LATEST")
          DESC=$(jq -r '.description' "$LATEST")
          COUNT=$(jq -r '.articleCount' "$LATEST")
          DOMESTIC=$(jq -r '[.articles[] | select(.category=="domestic")] | length' "$LATEST")
          INTL=$(jq -r '[.articles[] | select(.category=="international")] | length' "$LATEST")
          BODY=$(cat <<EOF
          **${TITLE}**

          > ${DESC}

          - 주차: \`${WEEK}\`
          - 총 기사: **${COUNT}개** (국내 ${DOMESTIC}, 해외 ${INTL})
          - 포스트 보기: https://rebranding-brik.vercel.app/posts/${WEEK}
          - 아카이브: https://rebranding-brik.vercel.app/archive

          이 이슈는 GitHub Actions가 자동 생성했습니다. 확인 후 닫아주세요.
          EOF
          )
          gh issue create --title "📰 [$WEEK] $TITLE" --body "$BODY"

      - name: Alert on failure (with root-cause analysis)
        # Fires when any prior step in this job fails. Creates a GitHub Issue
        # (which sends the maintainer an email) that includes an automatic
        # first-pass root-cause analysis by grepping the failed job's logs
        # for known error signatures. Cron jobs fail silently otherwise.
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          DATE=$(date -u '+%Y-%m-%d %H:%M UTC')

          # Fetch this run's failed-step logs so we can pattern-match.
          # `gh run view --log-failed` returns just the failing step output.
          gh run view "$GITHUB_RUN_ID" --log-failed > /tmp/failure.log 2>/dev/null || true
          LOG_LINES=$(wc -l < /tmp/failure.log 2>/dev/null || echo 0)

          # Match known signatures. Order matters — more specific first.
          CAUSES=""
          add() { CAUSES="${CAUSES}- ${1}
          "; }

          if grep -qE "not_found_error.*model|model.*claude-.*: 404" /tmp/failure.log; then
            add "**Anthropic 모델 ID retired** — summarizer.ts의 4개 호출처 모두 최신 model id로 교체 필요. claude-api 스킬로 현행 id 확인."
          fi
          if grep -qE "401|invalid_api_key|authentication.*fail|Unauthorized" /tmp/failure.log; then
            add "**API 키 인증 실패** — GitHub secret \`ANTHROPIC_API_KEY\` 만료/폐기 의심. 콘솔에서 재발급 후 secret 갱신."
          fi
          if grep -qE "Premature close|Invalid response body|ECONNRESET|socket hang up" /tmp/failure.log; then
            add "**Anthropic API 스트림 조기 종료** (일시적 네트워크/서버 문제) — 대부분 재시도 로직으로 자동 회복. 반복되면 SDK maxRetries 상향 검토."
          fi
          if grep -qE "429|rate_limit|overloaded_error|too_many_requests" /tmp/failure.log; then
            add "**API rate limit / overloaded** — Anthropic 서버 혼잡. 30분~1시간 후 수동 재실행 권장."
          fi
          if grep -qE "npm error.*sync|EUSAGE.*npm ci|out of sync|Missing:.*from lock file" /tmp/failure.log; then
            add "**package.json ↔ package-lock.json 불일치** — 로컬에서 \`rm -rf node_modules package-lock.json && npm install\` 후 commit/push."
          fi
          if grep -qE "exceeded the maximum execution time|The operation was canceled" /tmp/failure.log; then
            add "**워크플로우 타임아웃 초과** — 현재 30분. RSS 소스 축소 or timeout-minutes 상향."
          fi
          if grep -qE "Suspiciously few articles" /tmp/failure.log; then
            add "**RSS 소스 대부분 실패** — sources.ts의 feed URL 살아있는지 확인 (\`curl -I\`). Google News RSS 자체가 죽었으면 대체 필요."
          fi
          if grep -qE "Too many empty summaries" /tmp/failure.log; then
            add "**요약 LLM 배치 전멸** — 위의 API 관련 원인 중 하나가 진짜 트리거. 재시도까지 다 실패한 상태."
          fi
          if grep -qE "Title is the LLM-failure fallback" /tmp/failure.log; then
            add "**Weekly title 생성 실패** — 같은 API 이슈 파생. 위 항목과 같이 조치."
          fi
          if grep -qE "could not add label|label.*not found" /tmp/failure.log; then
            add "**GitHub label 미존재** — 워크플로우가 지정한 label이 리포에 없음 (예전 automation label 이슈)."
          fi
          if grep -qE "Bad credentials|GH_TOKEN|permission denied.*push" /tmp/failure.log; then
            add "**GitHub 인증 실패** — GITHUB_TOKEN 권한 부족 or contents:write 누락. workflow file 상단 permissions 블록 확인."
          fi
          if grep -qE "cannot lock ref|unable to update local ref" /tmp/failure.log; then
            add "**git ref 충돌** — 백업/복원 후 stale lockfile. 로컬에서 \`find .git -name '*.lock' -delete\` 후 재시도."
          fi

          if [ -z "$CAUSES" ]; then
            CAUSES="- 알려진 패턴에 매치되지 않음. 로그 직접 확인 필요."
          fi

          # First 10 lines of ##[error] annotations for at-a-glance context.
          CONTEXT=$(grep -E "##\[error\]|Error:|FAIL" /tmp/failure.log | head -8 | sed 's/^/    /')
          if [ -z "$CONTEXT" ]; then
            CONTEXT="    (에러 라인 추출 실패)"
          fi

          BODY=$(cat <<EOF
          주간 뉴스 수집 워크플로우가 실패했습니다.

          ## 🎯 자동 원인 분석
          ${CAUSES}
          ## 📋 로그 발췌 (최대 8줄)
          \`\`\`
          ${CONTEXT}
          \`\`\`

          ## 🔗 링크
          - 전체 로그: ${RUN_URL}
          - 커밋: [\`${GITHUB_SHA:0:7}\`](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA})

          ## 🛠 다음 단계
          1. 위 원인 분석을 바탕으로 fix
          2. commit + push
          3. 'Run workflow'로 수동 재실행 (또는 다음 화요일 cron 대기)

          ---
          실행 시각: ${DATE} · 파싱된 로그 라인 수: ${LOG_LINES}
          EOF
          )

          gh issue create --title "🚨 Weekly collection failed ($DATE)" --body "$BODY"
