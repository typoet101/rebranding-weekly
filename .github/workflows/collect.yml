name: Weekly News Collection

on:
  schedule:
    # Every Monday at 00:00 UTC (09:00 KST)
    - cron: "0 0 * * 1"
  workflow_dispatch: {}

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run news collection
        run: npx tsx scripts/collect-manual.ts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}

      - name: Commit new post
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "content: weekly rebranding news"
          file_pattern: "content/posts/*.json"
          commit_author: "GitHub Action <action@github.com>"
